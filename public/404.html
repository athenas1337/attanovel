<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AttaNovel</title>
  <script type="text/javascript">
    // GitHub Pages SPA redirect trick
    // Encodes the path into a query string so the browser is redirected to index.html
    // which then decodes it and pushes it to the History API.
    var segmentCount = 1; // Number of path segments in the base URL (e.g. /attanovel = 1)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
